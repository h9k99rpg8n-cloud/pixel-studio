<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111827">
  <meta name="description" content="Pixel Studio es un editor web movil para crear texturas pixel art para complementos de Minecraft Bedrock.">
  <title>Pixel Studio Alfa 0.5.5</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>Pixel Studio</h1>
        <p>Alfa 0.5.5 - Iconos y zoom tactil</p>
      </div>
      <button id="exportBtn" class="primary-btn icon-btn" title="Exportar PNG"><span data-lucide="download"></span> Exportar</button>
    </header>

    <section class="panel compact-panel">
      <div class="basic-row">
        <label>
          Tamano
          <select id="sizeSelect">
            <option value="16">16 x 16</option>
            <option value="32" selected>32 x 32</option>
            <option value="64">64 x 64</option>
            <option value="128">128 x 128</option>
          </select>
        </label>

        <label>
          Color
          <input id="colorPicker" type="color" value="#37d67a">
        </label>
      </div>

      <input id="importInput" type="file" accept="image/png,image/jpeg,image/webp" hidden>

      <div class="tabbar">
        <button class="tab active" data-panel="projectPanel"><span data-lucide="file-cog"></span> Proyecto</button>
        <button class="tab" data-panel="libraryPanel"><span data-lucide="gallery-horizontal"></span> Biblioteca</button>
        <button class="tab" data-panel="palettePanel"><span data-lucide="palette"></span> Paleta</button>
        <button class="tab" data-panel="layersControlsPanel"><span data-lucide="layers"></span> Capas</button>
      </div>

      <div class="panel-page active" id="projectPanel">
        <button id="saveBtn" class="mini-btn"><span data-lucide="save"></span> Guardar</button>
        <button id="loadBtn" class="mini-btn"><span data-lucide="folder-open"></span> Cargar</button>
        <button id="newProjectBtn" class="mini-btn"><span data-lucide="file-plus"></span> Nuevo</button>
        <button id="renameProjectBtn" class="mini-btn"><span data-lucide="edit-3"></span> Renombrar</button>
        <button id="importBtn" class="mini-btn"><span data-lucide="image-plus"></span> Importar</button>
        <button id="undoBtn" class="mini-btn"><span data-lucide="undo-2"></span> Deshacer</button>
        <button id="redoBtn" class="mini-btn"><span data-lucide="redo-2"></span> Rehacer</button>
      </div>

      <div class="panel-page library-page" id="libraryPanel">
        <div class="project-name" id="projectNameText">Proyecto principal</div>
        <div class="project-limit">Biblioteca: hasta 340 proyectos</div>
        <div class="project-list" id="projectList"></div>
      </div>

      <div class="panel-page palette-page" id="palettePanel">
        <button id="addFavoriteColorBtn" class="mini-btn"><span data-lucide="star"></span> Favorito +</button>
        <div class="palette-section-title">Favoritos</div>
        <div class="color-row" id="favoriteColors"></div>
        <div class="palette-section-title">Recientes</div>
        <div class="color-row" id="recentColors"></div>
        <div class="palette-section-title">Mas usados</div>
        <div class="color-row" id="usedColors"></div>
      </div>

      <div class="panel-page" id="layersControlsPanel">
        <button id="addLayerBtn" class="mini-btn"><span data-lucide="plus"></span> Nueva</button>
        <button id="toggleLayerBtn" class="mini-btn"><span data-lucide="eye-off"></span> Ocultar</button>
        <button id="deleteLayerBtn" class="mini-btn danger-lite"><span data-lucide="trash-2"></span> Eliminar</button>
      </div>

      <div class="layers-panel" id="layersPanel"></div>
      <div class="status" id="statusText">Listo para pintar</div>
    </section>

    <section class="canvas-card">
      <div class="floating-tools">
        <button class="tool active" data-tool="pencil" title="Pintar"><span data-lucide="pencil"></span></button>
        <button class="tool" data-tool="eraser" title="Borrar"><span data-lucide="eraser"></span></button>
        <button class="tool" data-tool="bucket" title="Cubeta"><span data-lucide="paint-bucket"></span></button>
        <button class="tool" data-tool="picker" title="Cuentagotas"><span data-lucide="pipette"></span></button>
        <button id="clearBtn" class="tool danger" title="Limpiar capa"><span data-lucide="trash"></span></button>
      </div>
      <div class="canvas-scroll" id="canvasScroll">
        <canvas id="pixelCanvas" width="512" height="512"></canvas>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
