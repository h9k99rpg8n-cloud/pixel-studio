<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111827">
  <meta name="description" content="Pixel Studio es un editor web movil para crear texturas pixel art para complementos de Minecraft Bedrock.">
  <title>Pixel Studio Alfa 0.5.4</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>Pixel Studio</h1>
        <p>Alfa 0.5.4 - Paleta de colores</p>
      </div>
      <button id="exportBtn" class="primary-btn icon-btn" title="Exportar PNG">Exportar</button>
    </header>

    <section class="panel compact-panel">
      <div class="basic-row">
        <label>
          Tamano
          <select id="sizeSelect">
            <option value="16">16 x 16</option>
            <option value="32" selected>32 x 32</option>
            <option value="64">64 x 64</option>
            <option value="128">128 x 128</option>
          </select>
        </label>

        <label>
          Color
          <input id="colorPicker" type="color" value="#37d67a">
        </label>
      </div>

      <input id="importInput" type="file" accept="image/png,image/jpeg,image/webp" hidden>

      <div class="tabbar">
        <button class="tab active" data-panel="toolsPanel">Herramientas</button>
        <button class="tab" data-panel="projectPanel">Proyecto</button>
        <button class="tab" data-panel="libraryPanel">Biblioteca</button>
        <button class="tab" data-panel="palettePanel">Paleta</button>
        <button class="tab" data-panel="layersControlsPanel">Capas</button>
        <button class="tab" data-panel="viewPanel">Vista</button>
      </div>

      <div class="panel-page active" id="toolsPanel">
        <button class="tool active" data-tool="pencil" title="Pintar">Lapiz</button>
        <button class="tool" data-tool="eraser" title="Borrar">Borrar</button>
        <button class="tool" data-tool="bucket" title="Cubeta">Cubeta</button>
        <button class="tool" data-tool="picker" title="Cuentagotas">Gotas</button>
        <button id="clearBtn" class="tool danger" title="Limpiar capa">Limpiar</button>
      </div>

      <div class="panel-page" id="projectPanel">
        <button id="saveBtn" class="mini-btn">Guardar</button>
        <button id="loadBtn" class="mini-btn">Cargar</button>
        <button id="newProjectBtn" class="mini-btn">Nuevo</button>
        <button id="renameProjectBtn" class="mini-btn">Renombrar</button>
        <button id="importBtn" class="mini-btn">Importar</button>
        <button id="undoBtn" class="mini-btn">Deshacer</button>
        <button id="redoBtn" class="mini-btn">Rehacer</button>
      </div>

      <div class="panel-page library-page" id="libraryPanel">
        <div class="project-name" id="projectNameText">Proyecto principal</div>
        <div class="project-limit">Biblioteca: hasta 340 proyectos</div>
        <div class="project-list" id="projectList"></div>
      </div>

      <div class="panel-page palette-page" id="palettePanel">
        <button id="addFavoriteColorBtn" class="mini-btn">Favorito +</button>
        <div class="palette-section-title">Favoritos</div>
        <div class="color-row" id="favoriteColors"></div>
        <div class="palette-section-title">Recientes</div>
        <div class="color-row" id="recentColors"></div>
        <div class="palette-section-title">Mas usados</div>
        <div class="color-row" id="usedColors"></div>
      </div>

      <div class="panel-page" id="layersControlsPanel">
        <button id="addLayerBtn" class="mini-btn">Nueva</button>
        <button id="toggleLayerBtn" class="mini-btn">Ocultar</button>
        <button id="deleteLayerBtn" class="mini-btn danger-lite">Eliminar</button>
      </div>

      <div class="panel-page" id="viewPanel">
        <button id="zoomOutBtn" class="mini-btn">Zoom -</button>
        <button id="zoomResetBtn" class="mini-btn">Centrar</button>
        <button id="zoomInBtn" class="mini-btn">Zoom +</button>
      </div>

      <div class="layers-panel" id="layersPanel"></div>
      <div class="status" id="statusText">Listo para pintar</div>
    </section>

    <section class="canvas-card">
      <div class="canvas-scroll" id="canvasScroll">
        <canvas id="pixelCanvas" width="512" height="512"></canvas>
      </div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
